let _ctx=null;
function ac(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();return _ctx;}
function playClick(){try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(700,c.currentTime);o.frequency.exponentialRampToValueAtTime(350,c.currentTime+0.08);g.gain.setValueAtTime(0.22,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.start();o.stop(c.currentTime+0.1);}catch(e){}}
function playSuccess(){try{const c=ac();[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(0.18,c.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.1+0.15);o.start(c.currentTime+i*0.1);o.stop(c.currentTime+i*0.1+0.15);});}catch(e){}}
function playError(){try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.type="sawtooth";o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(280,c.currentTime);o.frequency.exponentialRampToValueAtTime(130,c.currentTime+0.22);g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.22);o.start();o.stop(c.currentTime+0.22);}catch(e){}}
let _music=null;
const MELODY=[261,293,329,392,440,392,349,329,293,261,293,329,349,392,440,523];
let _mBeat=0;
function startMusic(){
  if(_music)return;
  try{
    const c=ac(),master=c.createGain();master.gain.value=0.04;master.connect(c.destination);
    function tick(){
      const o=c.createOscillator(),g=c.createGain();
      o.type="triangle";o.frequency.value=MELODY[_mBeat%MELODY.length];
      o.connect(g);g.connect(master);
      g.gain.setValueAtTime(0.9,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.42);
      o.start();o.stop(c.currentTime+0.45);
      _mBeat++;
    }
    tick();
    const id=setInterval(tick,480);
    _music={id,master};
  }catch(e){}
}
function stopMusic(){if(!_music)return;try{clearInterval(_music.id);_music.master.gain.exponentialRampToValueAtTime(0.001,ac().currentTime+0.3);}catch(e){}_music=null;}

// ════════════════════════════════════════════════
// SPEECH
// ════════════════════════════════════════════════
function speak(text,lang,gender){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==="fr"?"fr-FR":"en-US"; u.rate=0.82; u.pitch=gender==="female"?1.2:0.8;
  const voices=window.speechSynthesis.getVoices();
  const lc=lang==="fr"?"fr":"en";
  const hints=gender==="female"?["female","woman","girl"]:["male","man","boy"];
  let v=voices.find(x=>x.lang.toLowerCase().startsWith(lc)&&hints.some(h=>x.name.toLowerCase().includes(h)));
  if(!v)v=voices.find(x=>x.lang.toLowerCase().startsWith(lc));
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}
function W(item,lang){return lang==="fr"?(item.fr||item.en):(item.en||item.fr);}

// QUIZ
// ════════════════════════════════════════════════
function QuizMode({category,S,onBack,onDone}){
  const {lang,voiceGender,theme,soundFx}=S;
  const items=DATA[category]; const cat=CATS.find(c=>c.id===category); const night=theme.id==="night";
  const [cur,setCur]=useState(null);const [opts,setOpts]=useState([]);const [sel,setSel]=useState(null);
  const [score,setScore]=useState(0);const [total,setTotal]=useState(0);const [done,setDone]=useState(false);

  function next(){
    const idx=Math.floor(Math.random()*items.length);
    const c=items[idx];setCur(c);setSel(null);
    const others=items.filter((_,i)=>i!==idx).sort(()=>Math.random()-0.5).slice(0,3);
    setOpts([...others,c].sort(()=>Math.random()-0.5));
    setTimeout(()=>speak(W(c,lang),lang,voiceGender),400);
  }
  useEffect(()=>{next();},[]);

  function answer(item){
    if(sel)return;setSel(item);
    const ok=item.id===cur.id,nt=total+1,ns=ok?score+1:score;
    setTotal(nt);setScore(ns);
    if(ok){if(soundFx)playSuccess();speak(lang==="fr"?"Bravo!":"Well done!",lang,voiceGender);}
    else  {if(soundFx)playError();  speak(W(cur,lang),lang,voiceGender);}
    if(nt>=10)setTimeout(()=>setDone(true),1300);
    else      setTimeout(()=>next(),1300);
  }

  if(done){
    const pct=Math.round((score/total)*100);
    const stars=pct>=90?3:pct>=60?2:pct>=30?1:0;
    onDone(score,stars);
    return(
      <div style={{textAlign:"center",padding:32,animation:"fadeIn 0.4s ease"}}>
        <div style={{fontSize:80}}>{pct>=80?"🏆":pct>=50?"🎉":"💪"}</div>
        <div style={{fontSize:28,fontWeight:900,color:cat.color,fontFamily:"Nunito",marginTop:14}}>
          {pct>=80?"Excellent!":pct>=50?(lang==="fr"?"Bien fait!":"Well done!"):(lang==="fr"?"Continue!":"Keep going!")}
        </div>
        <div style={{fontSize:20,fontWeight:700,color:night?"#fff":"#555",fontFamily:"Nunito",marginTop:8}}>
          {score}/{total} {lang==="fr"?"bonnes réponses":"correct"}
        </div>
        <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:10}}>
          {[1,2,3].map(i=><span key={i} style={{fontSize:32,opacity:stars>=i?1:0.2,filter:stars>=i?"drop-shadow(0 0 6px gold)":"none"}}>⭐</span>)}
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:22}}>
          <button onClick={()=>{setScore(0);setTotal(0);setDone(false);next();}}
            style={{background:cat.color,color:"#fff",border:"none",borderRadius:16,padding:"13px 22px",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"Nunito"}}>
            🔄 {lang==="fr"?"Rejouer":"Play Again"}
          </button>
          <button onClick={onBack} style={{background:night?"#444":"#eee",color:night?"#fff":"#555",border:"none",borderRadius:16,padding:"13px 22px",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"Nunito"}}>
            ← {lang==="fr"?"Retour":"Back"}
          </button>
        </div>
      </div>
    );
  }
  if(!cur)return null;

  // Special display for colors
  const isColor=category==="colors";

  return(
    <div style={{padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:14,fontWeight:700,color:night?"#ccc":"#666",fontFamily:"Nunito"}}>Q {total+1}/10</span>
        <span style={{background:cat.color+"22",borderRadius:20,padding:"5px 14px",fontSize:14,fontWeight:800,color:cat.color,fontFamily:"Nunito"}}>⭐ {score}</span>
      </div>
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:night?"#ddd":"#666",fontFamily:"Nunito",marginBottom:8}}>
          {lang==="fr"?"Quelle image correspond à :":"Which picture matches:"}
        </div>
        <div style={{background:cat.color,color:"#fff",borderRadius:20,padding:"12px 28px",fontSize:24,fontWeight:900,fontFamily:"Nunito",display:"inline-block",boxShadow:`0 6px 20px ${cat.color}60`}}>
          {W(cur,lang)}
        </div>
        <button onClick={()=>speak(W(cur,lang),lang,voiceGender)} style={{display:"block",margin:"10px auto 0",background:"transparent",border:"none",fontSize:26,cursor:"pointer"}}>🔊</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {opts.map(opt=>{
          const ok=opt.id===cur.id,ch=sel?.id===opt.id;
          let bg=theme.card,bdr=night?"3px solid #444":"3px solid #eee";
          if(sel){if(ok){bg="#6BCB77";bdr="3px solid #4aa85c";}else if(ch){bg="#FF6B6B";bdr="3px solid #d94f4f";}}
          return(
            <div key={opt.id} onClick={()=>answer(opt)}
              style={{background:bg,borderRadius:18,padding:16,display:"flex",flexDirection:"column",alignItems:"center",gap:8,cursor:sel?"default":"pointer",border:bdr,transition:"all 0.2s"}}>
              {isColor
                ? <div style={{width:56,height:56,borderRadius:12,background:opt.hex,boxShadow:`0 4px 12px ${opt.hex}80`,border:"2px solid rgba(0,0,0,0.08)"}}/>
                : <div style={{fontSize:44}}>{opt.emoji}</div>
              }
              <div style={{fontSize:13,fontWeight:800,color:sel&&(ok||ch)?"#fff":night?"#fff":"#333",fontFamily:"Nunito",textAlign:"center"}}>
                {opt.num ? opt.num : W(opt,lang)}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// CATEGORY VIEW
// ════════════════════════════════════════════════
function CategoryView({category,S,onBack,progress,setProgress}){
  const {lang,voiceGender,theme,soundFx}=S;
  const [activeId,setActiveId]=useState(null);
  const [mode,setMode]=useState("learn");
  const items=DATA[category]; const cat=CATS.find(c=>c.id===category); const night=theme.id==="night";
  const prog=progress[category]||{stars:0,bestScore:0,plays:0};
  const isColor=category==="colors";

  function handleDone(score,stars){
    const newProg={
      stars:Math.max(prog.stars,stars),
      bestScore:Math.max(prog.bestScore,score),
      plays:(prog.plays||0)+1,
    };
    const updated={...progress,[category]:newProg};
    setProgress(updated);
    saveProgress(updated);
  }

  if(mode==="quiz")return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px 0"}}>
        <button onClick={()=>setMode("learn")} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer"}}>←</button>
        <div style={{fontSize:20,fontWeight:900,color:night?"#fff":"#2d2d2d",fontFamily:"Nunito"}}>{cat.icon} Quiz</div>
      </div>
      <QuizMode category={category} S={S} onBack={()=>setMode("learn")} onDone={handleDone}/>
    </div>
  );

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 16px 8px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer"}}>←</button>
          <div style={{fontSize:20,fontWeight:900,color:night?"#fff":"#2d2d2d",fontFamily:"Nunito"}}>
            {cat.icon} {lang==="fr"?cat.frL:cat.enL}
          </div>
        </div>
        <button onClick={()=>{if(soundFx)playClick();setMode("quiz");}}
          style={{background:cat.color,color:"#fff",border:"none",borderRadius:14,padding:"8px 16px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"Nunito",boxShadow:`0 4px 12px ${cat.color}50`}}>
          🎮 Quiz
        </button>
      </div>

      {/* Progress strip */}
      {prog.plays>0&&(
        <div style={{margin:"0 16px 8px",background:night?"#1e1e3a":cat.bg,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
          <StarBadge count={prog.stars}/>
          <ProgressBar value={prog.bestScore} max={10} color={cat.color}/>
          <span style={{fontSize:12,fontWeight:700,color:cat.color,fontFamily:"Nunito",whiteSpace:"nowrap"}}>{prog.bestScore}/10</span>
          <span style={{fontSize:11,color:night?"#999":"#aaa",fontFamily:"Nunito",whiteSpace:"nowrap"}}>×{prog.plays}</span>
        </div>
      )}

      {/* Cards */}
      <div style={{padding:"8px 16px 80px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10}}>
        {items.map(item=>{
          const active=activeId===item.id;
          const word=W(item,lang);
          return(
            <div key={item.id} onClick={()=>{
              if(soundFx)playClick();
              setActiveId(item.id);
              speak(word,lang,voiceGender);
            }}
              style={{background:active?cat.color:theme.card,borderRadius:18,padding:"16px 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer",
                transform:active?"scale(1.07)":"scale(1)",
                boxShadow:active?`0 8px 20px ${cat.color}80`:night?"0 3px 10px rgba(0,0,0,0.4)":"0 3px 10px rgba(0,0,0,0.08)",
                transition:"all 0.25s cubic-bezier(0.34,1.56,0.64,1)",
                border:active?`3px solid ${cat.color}`:night?"3px solid #444":"3px solid #f0f0f0"}}>
              {/* Color swatch or emoji */}
              {isColor
                ? <div style={{width:52,height:52,borderRadius:12,background:item.hex,boxShadow:`0 4px 12px ${item.hex}80`,border:"2px solid rgba(0,0,0,0.08)"}}/>
                : <div style={{fontSize:42}}>{item.emoji}</div>
              }
              {item.num&&<div style={{fontSize:18,fontWeight:900,color:active?"#fff":night?"#fff":"#2d2d2d",fontFamily:"Nunito"}}>{item.num}</div>}
              <div style={{fontSize:13,fontWeight:800,color:active?"rgba(255,255,255,0.95)":cat.color,fontFamily:"Nunito",textAlign:"center",lineHeight:1.2}}>{word}</div>
              <div style={{fontSize:10,color:active?"rgba(255,255,255,0.6)":night?"#999":"#ccc",fontFamily:"Nunito"}}>🔊 tap</div>
            </div>
          );
        })}
      </div>

      {activeId&&(
        <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",
          background:cat.color,color:"#fff",borderRadius:20,padding:"12px 24px",
          fontSize:20,fontWeight:900,fontFamily:"Nunito",
          boxShadow:`0 8px 24px ${cat.color}70`,animation:"slideUp 0.3s ease",
          whiteSpace:"nowrap",zIndex:100}}>
          {(()=>{const it=items.find(i=>i.id===activeId);
            return isColor
              ? <span style={{display:"flex",alignItems:"center",gap:10}}><span style={{width:24,height:24,borderRadius:6,background:it?.hex,display:"inline-block",border:"2px solid rgba(255,255,255,0.5)"}}/>{W(it,lang)}</span>
              : `${it?.emoji} ${W(it,lang)}`;
          })()}
        </div>
      )}
    </div>
  );
}

      {/* Summary */}
      <div style={{background:night?"#1e1e3a":"linear-gradient(135deg,#fff9f0,#f0f8ff)",borderRadius:20,padding:20,marginBottom:16,textAlign:"center",border:night?"1px solid #333":"1px solid #e0e8ff"}}>

        <div style={{marginTop:12}}>
          <ProgressBar value={totalStars} max={maxStars} color="#FFD700"/>
        </div>
        <div style={{fontSize:13,color:night?"#aaa":"#888",fontFamily:"Nunito",marginTop:8}}>
          {played} / {CATS.length} {lang==="fr"?"catégories jouées":"categories played"}
        </div>
      </div>

      {/* Per category */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {CATS.map(cat=>{
          const p=progress[cat.id]||null;
          return(
            <div key={cat.id} style={{background:night?"#1e1e3a":cat.bg,borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,border:`2px solid ${cat.color}20`}}>

              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:800,color:cat.color,fontFamily:"Nunito"}}>{lang==="fr"?cat.frL:cat.enL}</div>
                {p?(
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                    <StarBadge count={p.stars}/>
                    <ProgressBar value={p.bestScore} max={10} color={cat.color}/>
                    <span style={{fontSize:11,color:night?"#aaa":"#888",fontFamily:"Nunito",whiteSpace:"nowrap"}}>{p.bestScore}/10</span>

                  <div style={{fontSize:12,color:night?"#555":"#bbb",fontFamily:"Nunito",marginTop:2}}>
                    {lang==="fr"?"Pas encore joué":"Not played yet"}
                  </div>
                )}
              </div>
              {p&&<span style={{fontSize:11,color:night?"#777":"#bbb",fontFamily:"Nunito"}}>×{p.plays}</span>}
            </div>
          );
        })}
      </div>

      <button onClick={onReset}
        style={{marginTop:24,width:"100%",background:night?"#333":"#fee2e2",color:"#ef4444",border:"2px solid #ef4444",borderRadius:16,padding:"12px 0",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"Nunito"}}>

  );
}

              return(
                <button key={cid} onClick={()=>{if(soundFx)playClick();onSelect(cid);}}
                  style={{background:cat.bg,border:`3px solid ${cat.color}20`,borderRadius:18,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",width:"100%",textAlign:"left",transition:"all 0.18s"}}>
                  <div style={{fontSize:36,minWidth:44,textAlign:"center"}}>{cat.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:17,fontWeight:900,color:cat.color,fontFamily:"Nunito"}}>{lang==="fr"?cat.frL:cat.enL}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                      <span style={{fontSize:11,color:"#aaa",fontFamily:"Nunito"}}>{DATA[cid].length} {lang==="fr"?"éléments":"items"}</span>
                      {p&&<StarBadge count={p.stars}/>}
                    </div>
                  </div>
                  <div style={{fontSize:20,color:cat.color}}>→</div>
                </button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════
// SPLASH
// ════════════════════════════════════════════════
function SplashView({S,onStart,onSettings,onAbout,onProgress,progress}){
  const {lang,theme,soundFx}=S; const night=theme.id==="night";
  const [b,setB]=useState(false);
  useEffect(()=>{const t=setInterval(()=>setB(x=>!x),1800);return()=>clearInterval(t);},[]);
  const totalStars=Object.values(progress).reduce((a,p)=>a+(p.stars||0),0);
  const maxStars=CATS.length*3;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24,textAlign:"center"}}>
      <div style={{fontSize:86,transition:"transform 0.4s cubic-bezier(0.34,1.56,0.64,1)",transform:b?"scale(1.12) rotate(5deg)":"scale(1) rotate(-3deg)"}}>🎓</div>
      <div style={{fontSize:36,fontWeight:900,color:theme.pri,fontFamily:"'Righteous',cursive",letterSpacing:1,marginTop:8,marginBottom:2}}>KidLearn</div>
      <div style={{fontSize:12,color:night?"#666":"#ccc",fontFamily:"Nunito",marginBottom:4}}>v1.5.0</div>
      <div style={{fontSize:14,color:night?"#aaa":"#888",fontFamily:"Nunito",marginBottom:8}}>
        {lang==="fr"?"Apprends le français et l'anglais! 🌍":"Learn French & English! 🌍"}
      </div>
      {/* Progress mini bar */}
      {totalStars>0&&(
        <div style={{background:night?"#1e1e3a":"#f5f5f5",borderRadius:50,padding:"8px 16px",display:"flex",alignItems:"center",gap:8,marginBottom:24}}>
          <span style={{fontSize:16}}>⭐</span>
          <ProgressBar value={totalStars} max={maxStars} color="#FFD700"/>
          <span style={{fontSize:12,fontWeight:800,color:"#FFD700",fontFamily:"Nunito",whiteSpace:"nowrap"}}>{totalStars}/{maxStars}</span>
        </div>
      )}
      {totalStars===0&&<div style={{height:24,marginBottom:8}}/>}
      <button onClick={()=>{if(soundFx)playClick();onStart();}}
        style={{background:`linear-gradient(135deg,${theme.pri},${theme.sec})`,color:"#fff",border:"none",borderRadius:24,padding:"18px 60px",fontSize:22,fontWeight:900,cursor:"pointer",fontFamily:"Nunito",boxShadow:`0 8px 28px ${theme.pri}60`,marginBottom:16}}>
        🚀 {lang==="fr"?"Commencer":"Start"}
      </button>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",marginBottom:8}}>
        {[
          {icon:"📊",label:lang==="fr"?"Progrès":"Progress",action:onProgress},
          {icon:"⚙️",label:lang==="fr"?"Paramètres":"Settings",action:onSettings},
          {icon:"ℹ️",label:lang==="fr"?"À propos":"About",action:onAbout},
        ].map(btn=>(
          <button key={btn.label} onClick={()=>{if(soundFx)playClick();btn.action();}}
            style={{background:night?"#2a2a4a":"#f5f5f5",color:night?"#ddd":"#555",border:"none",borderRadius:16,padding:"12px 16px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"Nunito"}}>
            {btn.icon} {btn.label}
          </button>
        ))}
      </div>
      <div style={{marginTop:24,display:"flex",gap:10}}>
        {["🔢","🔤","🦁","🍎","🎨","📅"].map((e,i)=>(
          <div key={i} style={{fontSize:22,opacity:0.5,animation:`float ${1.4+i*0.18}s ease-in-out infinite alternate`,animationDelay:`${i*0.13}s`}}>{e}</div>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════
// APP ROOT
// ════════════════════════════════════════════════
function App(){
  const [view,setView]=useState("splash");
  const [cat,setCat]=useState(null);
  const [S,setS]=useState({lang:"fr",voiceGender:"female",theme:THEMES[0],soundFx:true,music:false});
  const [progress,setProgress]=useState(()=>loadProgress());

  useEffect(()=>{
    window.speechSynthesis?.getVoices();
    window.speechSynthesis?.addEventListener?.("voiceschanged",()=>window.speechSynthesis?.getVoices());
    return()=>stopMusic();
  },[]);

  const night=S.theme.id==="night";

  function handleResetProgress(){
    if(window.confirm(S.lang==="fr"?"Réinitialiser tout le progrès?":"Reset all progress?")){
      setProgress({});saveProgress({});
    }
  }

  return(
    <div style={{minHeight:"100vh",background:S.theme.bg,display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:480,minHeight:"100vh",background:night?"rgba(26,26,46,0.97)":"rgba(255,255,255,0.93)",backdropFilter:"blur(20px)"}}>

        {/* Top bar for menu */}
        {view==="menu"&&(
          <div style={{display:"flex",alignItems:"center",padding:"14px 16px",borderBottom:night?"1px solid #333":"1px solid #f0f0f0",gap:10,position:"sticky",top:0,background:night?"rgba(26,26,46,0.97)":"rgba(255,255,255,0.96)",zIndex:50,backdropFilter:"blur(10px)"}}>
            <button onClick={()=>setView("splash")} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer"}}>🏠</button>
            <div style={{flex:1,fontSize:18,fontWeight:900,color:night?"#fff":"#2d2d2d",fontFamily:"'Righteous',cursive"}}>KidLearn</div>
            <button onClick={()=>setView("progress")} style={{background:"transparent",border:"none",fontSize:20,cursor:"pointer"}}>📊</button>
            <button onClick={()=>setView("settings")} style={{background:"transparent",border:"none",fontSize:20,cursor:"pointer"}}>⚙️</button>
          </div>
        )}

        <div style={{overflowY:"auto"}}>
          {view==="splash"   && <SplashView S={S} onStart={()=>setView("menu")} onSettings={()=>setView("settings")} onAbout={()=>setView("about")} onProgress={()=>setView("progress")} progress={progress}/>}
          {view==="menu"     && <MenuView S={S} onSelect={c=>{setCat(c);setView("category");}} progress={progress}/>}
          {view==="category" && cat && <CategoryView category={cat} S={S} onBack={()=>setView("menu")} progress={progress} setProgress={setProgress}/>}
          {view==="progress" && <ProgressView progress={progress} lang={S.lang} theme={S.theme} onBack={()=>setView(view==="progress"?"splash":view)} onReset={handleResetProgress}/>}
          {view==="settings" && <SettingsView S={S} onSave={s=>{setS(s);setView("splash");}} onBack={()=>setView("splash")}/>}
          {view==="about"    && <AboutView lang={S.lang} theme={S.theme} onBack={()=>setView("splash")}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
