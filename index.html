// ══════════════════════════════════════
// SPEECH
// ══════════════════════════════════════
function speak(text, lang="fr", gender="female") {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang==="fr"?"fr-FR":"en-US";
  u.rate = 0.85;
  u.pitch = gender==="female"?1.2:0.8;
  const voices = window.speechSynthesis.getVoices();
  const lc = lang==="fr"?"fr":"en";
  const hints = gender==="female"?["female","woman","girl"]:["male","man","boy"];
  let v = voices.find(x=>x.lang.toLowerCase().startsWith(lc)&&hints.some(h=>x.name.toLowerCase().includes(h)));
  if(!v) v = voices.find(x=>x.lang.toLowerCase().startsWith(lc));
  if(v) u.voice = v;
  window.speechSynthesis.speak(u);
}

// ══════════════════════════════════════
// QUIZ
// ══════════════════════════════════════
function QuizMode({category,lang,voiceGender,theme,onBack}) {
  const items = DATA[category];
  const [current,setCurrent]=useState(null);
  const [options,setOptions]=useState([]);
  const [selected,setSelected]=useState(null);
  const [score,setScore]=useState(0);
  const [total,setTotal]=useState(0);
  const [done,setDone]=useState(false);
  const cat=CATEGORIES.find(c=>c.id===category);
  const night=theme.id==="night";

  function next(){
    const idx=Math.floor(Math.random()*items.length);
    const c=items[idx];
    setCurrent(c); setSelected(null);
    const others=items.filter((_,i)=>i!==idx).sort(()=>Math.random()-0.5).slice(0,3);
    setOptions([...others,c].sort(()=>Math.random()-0.5));
    setTimeout(()=>speak(lang==="fr"?c.fr:c.en,lang,voiceGender),300);
  }

  useEffect(()=>{next();},[]);

  function answer(item){
    if(selected) return;
    setSelected(item);
    const ok=item.id===current.id;
    const nt=total+1, ns=ok?score+1:score;
    setTotal(nt); setScore(ns);
    speak(ok?"Bravo!":(lang==="fr"?current.fr:current.en),lang,voiceGender);
    if(nt>=10) setTimeout(()=>setDone(true),1300);
    else setTimeout(()=>next(),1300);
  }

  if(done){
    const pct=Math.round((score/total)*100);
    return(
      <div style={{textAlign:"center",padding:32}}>
        <div style={{fontSize:80}}>{pct>=80?"🏆":pct>=60?"🎉":"💪"}</div>
        <div style={{fontSize:30,fontWeight:900,color:cat.color,fontFamily:"Nunito",marginTop:16}}>
          {pct>=80?"Excellent!":pct>=60?(lang==="fr"?"Bien fait!":"Well done!"):(lang==="fr"?"Continue!":"Keep going!")}
        </div>
        <div style={{fontSize:22,fontWeight:700,color:night?"#fff":"#555",fontFamily:"Nunito",marginTop:8}}>
          {score}/{total} {lang==="fr"?"bonnes réponses":"correct answers"}
        </div>
        <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:24}}>
          <button onClick={()=>{setScore(0);setTotal(0);setDone(false);next();}}
            style={{background:cat.color,color:"#fff",border:"none",borderRadius:16,padding:"14px 24px",fontSize:16,fontWeight:800,cursor:"pointer",fontFamily:"Nunito"}}>
            🔄 {lang==="fr"?"Rejouer":"Play Again"}
          </button>
          <button onClick={onBack}
            style={{background:night?"#444":"#eee",color:night?"#fff":"#555",border:"none",borderRadius:16,padding:"14px 24px",fontSize:16,fontWeight:800,cursor:"pointer",fontFamily:"Nunito"}}>
            ← {lang==="fr"?"Retour":"Back"}
          </button>
        </div>
      </div>
    );
  }
  if(!current) return null;

  return(
    <div style={{padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:700,color:night?"#ccc":"#666",fontFamily:"Nunito"}}>Q {total+1}/10</div>
        <div style={{background:cat.color+"22",borderRadius:20,padding:"6px 16px",fontSize:15,fontWeight:800,color:cat.color,fontFamily:"Nunito"}}>⭐ {score}</div>
      </div>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:700,color:night?"#ddd":"#666",fontFamily:"Nunito",marginBottom:10}}>
          {lang==="fr"?"Quelle image correspond à :":"Which picture matches:"}
        </div>
        <div style={{background:cat.color,color:"#fff",borderRadius:20,padding:"12px 28px",fontSize:24,fontWeight:900,fontFamily:"Nunito",display:"inline-block",boxShadow:`0 6px 20px ${cat.color}60`}}>
          {lang==="fr"?current.fr:current.en}
        </div>
        <button onClick={()=>speak(lang==="fr"?current.fr:current.en,lang,voiceGender)}
          style={{display:"block",margin:"10px auto 0",background:"transparent",border:"none",fontSize:26,cursor:"pointer"}}>🔊</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {options.map(opt=>{
          const ok=opt.id===current.id, chosen=selected?.id===opt.id;
          let bg=theme.card, bdr=night?"3px solid #444":"3px solid #eee";
          if(selected){if(ok){bg="#6BCB77";bdr="3px solid #4aa85c";}else if(chosen){bg="#FF6B6B";bdr="3px solid #d94f4f";}}
          return(
            <div key={opt.id} onClick={()=>answer(opt)}
              style={{background:bg,borderRadius:18,padding:16,display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:selected?"default":"pointer",border:bdr,transition:"all 0.2s"}}>
              <div style={{fontSize:42}}>{opt.emoji}</div>
              <div style={{fontSize:14,fontWeight:800,color:selected&&(ok||chosen)?"#fff":night?"#fff":"#333",fontFamily:"Nunito",textAlign:"center"}}>
                {opt.num||(lang==="fr"?opt.fr:opt.en)}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// CATEGORY VIEW
// ══════════════════════════════════════
function CategoryView({category,lang,voiceGender,theme,onBack}){
  const [activeId,setActiveId]=useState(null);
  const [mode,setMode]=useState("learn");
  const items=DATA[category];
  const cat=CATEGORIES.find(c=>c.id===category);
  const night=theme.id==="night";

  if(mode==="quiz") return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px 0"}}>
        <button onClick={()=>setMode("learn")} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer"}}>←</button>
        <div style={{fontSize:20,fontWeight:900,color:night?"#fff":"#2d2d2d",fontFamily:"Nunito"}}>{cat.icon} Quiz</div>
      </div>
      <QuizMode category={category} lang={lang} voiceGender={voiceGender} theme={theme} onBack={()=>setMode("learn")}/>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 16px 8px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer"}}>←</button>
          <div style={{fontSize:21,fontWeight:900,color:night?"#fff":"#2d2d2d",fontFamily:"Nunito"}}>{cat.icon} {lang==="fr"?cat.labelFr:cat.labelEn}</div>
        </div>
        <button onClick={()=>setMode("quiz")}
          style={{background:cat.color,color:"#fff",border:"none",borderRadius:14,padding:"8px 16px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"Nunito",boxShadow:`0 4px 12px ${cat.color}50`}}>
          🎮 Quiz
        </button>
      </div>
      <div style={{padding:"8px 16px 80px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10}}>
        {items.map(item=>{
          const active=activeId===item.id;
          return(
            <div key={item.id} onClick={()=>{setActiveId(item.id);speak(lang==="fr"?item.fr:item.en,lang,voiceGender);}}
              style={{background:active?cat.color:theme.card,borderRadius:18,padding:"16px 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer",
                transform:active?"scale(1.07)":"scale(1)",boxShadow:active?`0 8px 20px ${cat.color}80`:night?"0 3px 10px rgba(0,0,0,0.4)":"0 3px 10px rgba(0,0,0,0.08)",
                transition:"all 0.25s cubic-bezier(0.34,1.56,0.64,1)",border:active?`3px solid ${cat.color}`:night?"3px solid #444":"3px solid #f0f0f0"}}>
              <div style={{fontSize:40}}>{item.emoji}</div>
              <div style={{fontSize:17,fontWeight:800,color:active?"#fff":night?"#fff":"#2d2d2d",fontFamily:"Nunito",textAlign:"center",lineHeight:1.2}}>{item.num||item.en}</div>
              {item.num&&<div style={{fontSize:12,fontWeight:700,color:active?"rgba(255,255,255,0.9)":cat.color,fontFamily:"Nunito"}}>{lang==="fr"?item.fr:item.en}</div>}
              <div style={{fontSize:10,color:active?"rgba(255,255,255,0.7)":night?"#aaa":"#bbb",fontFamily:"Nunito"}}>🔊 tap</div>
            </div>
          );
        })}
      </div>
      {activeId&&(
        <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:cat.color,color:"#fff",borderRadius:20,padding:"12px 24px",fontSize:20,fontWeight:900,fontFamily:"Nunito",boxShadow:`0 8px 24px ${cat.color}70`,animation:"slideUp 0.3s ease",whiteSpace:"nowrap",zIndex:100}}>
          {(()=>{const it=items.find(i=>i.id===activeId);return`${it?.emoji} ${lang==="fr"?it?.fr:it?.en}`;})()}
        </div>
      )}
    </div>
  );
}

    <div style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:22}}>
        <button onClick={onBack} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer"}}>←</button>
        <div style={{fontSize:22,fontWeight:900,color:night?"#fff":"#2d2d2d",fontFamily:"Nunito"}}>⚙️ {s.lang==="fr"?"Paramètres":"Settings"}</div>
      </div>

      <div style={{marginBottom:22}}>
        <div style={{fontSize:14,fontWeight:800,color:night?"#ccc":"#666",fontFamily:"Nunito",marginBottom:8}}>🌍 {s.lang==="fr"?"Langue":"Language"}</div>
        <div style={{display:"flex",gap:10}}>
          {["en","fr"].map(l=>(
            <button key={l} onClick={()=>setS(p=>({...p,lang:l}))}
              style={{flex:1,background:s.lang===l?"#4ECDC4":night?"#333":"#f5f5f5",color:s.lang===l?"#fff":night?"#ddd":"#555",border:"none",borderRadius:14,padding:"14px 0",fontSize:17,fontWeight:800,cursor:"pointer",fontFamily:"Nunito",transition:"all 0.2s"}}>
              {l==="en"?"🇬🇧 English":"🇫🇷 Français"}
            </button>
          ))}
        </div>
      </div>

      <div style={{marginBottom:22}}>
        <div style={{fontSize:14,fontWeight:800,color:night?"#ccc":"#666",fontFamily:"Nunito",marginBottom:8}}>🎙️ {s.lang==="fr"?"Voix":"Voice"}</div>
        <div style={{display:"flex",gap:10}}>
          {[["female","👩 "+(s.lang==="fr"?"Femme":"Female")],["male","👨 "+(s.lang==="fr"?"Homme":"Male")]].map(([v,label])=>(
            <button key={v} onClick={()=>setS(p=>({...p,voiceGender:v}))}
              style={{flex:1,background:s.voiceGender===v?"#C77DFF":night?"#333":"#f5f5f5",color:s.voiceGender===v?"#fff":night?"#ddd":"#555",border:"none",borderRadius:14,padding:"14px 0",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"Nunito",transition:"all 0.2s"}}>
              {label}
            </button>

      <div style={{marginBottom:28}}>
        <div style={{fontSize:14,fontWeight:800,color:night?"#ccc":"#666",fontFamily:"Nunito",marginBottom:8}}>🎨 {s.lang==="fr"?"Thème":"Theme"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {THEMES.map(t=>(
            <button key={t.id} onClick={()=>setS(p=>({...p,theme:t}))}
              style={{background:s.theme.id===t.id?t.primary:night?"#333":"#f5f5f5",color:s.theme.id===t.id?"#fff":night?"#ddd":"#555",border:s.theme.id===t.id?`3px solid ${t.primary}`:"3px solid transparent",borderRadius:14,padding:"12px 20px",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"Nunito",textAlign:"left",transition:"all 0.2s"}}>
              {t.name}
            </button>
          ))}
        </div>
      </div>

        style={{width:"100%",background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",color:"#fff",border:"none",borderRadius:18,padding:"16px 0",fontSize:18,fontWeight:900,cursor:"pointer",fontFamily:"Nunito",boxShadow:"0 6px 20px rgba(255,107,107,0.4)"}}>
        ✅ {s.lang==="fr"?"Enregistrer":"Save"}
      </button>
    </div>
  );
}

          <div>
            <div style={{fontSize:14,fontWeight:900,color:night?"#fff":"#333",fontFamily:"Nunito"}}>{lang==="fr"?item.fr:item.en}</div>
            <div style={{fontSize:12,color:night?"#bbb":"#666",fontFamily:"Nunito",lineHeight:1.5,marginTop:3}}>{lang==="fr"?item.tfr:item.ten}</div>
          </div>
        </div>
      ))}
      <div style={{textAlign:"center",marginTop:20,fontSize:13,color:night?"#666":"#ccc",fontFamily:"Nunito"}}>Made with ❤️ for little learners</div>
    </div>
  );
}

// ══════════════════════════════════════
// MENU
// ══════════════════════════════════════
function MenuView({onSelect,lang,theme}){
  const night=theme.id==="night";
  return(
    <div style={{padding:16}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:900,color:night?"#fff":"#2d2d2d",fontFamily:"Nunito"}}>
          {lang==="fr"?"Que veux-tu apprendre?":"What do you want to learn?"}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {CATEGORIES.map(cat=>(
          <button key={cat.id} onClick={()=>onSelect(cat.id)}
            style={{background:cat.bg,border:`3px solid ${cat.color}30`,borderRadius:20,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",width:"100%",textAlign:"left",transition:"transform 0.2s"}}>
            <div style={{fontSize:40,minWidth:48,textAlign:"center"}}>{cat.icon}</div>
            <div>
              <div style={{fontSize:18,fontWeight:900,color:cat.color,fontFamily:"Nunito"}}>{lang==="fr"?cat.labelFr:cat.labelEn}</div>
              <div style={{fontSize:11,color:"#999",fontFamily:"Nunito",marginTop:2}}>{DATA[cat.id].length} {lang==="fr"?"éléments":"items"}</div>
            </div>
            <div style={{marginLeft:"auto",fontSize:20,color:cat.color}}>→</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// SPLASH
// ══════════════════════════════════════
function SplashView({settings,onStart,onSettings,onAbout}){
  const {lang,theme}=settings;
  const night=theme.id==="night";
  const [b,setB]=useState(false);
  useEffect(()=>{const t=setInterval(()=>setB(x=>!x),1800);return()=>clearInterval(t);},[]);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24,textAlign:"center"}}>
      <div style={{fontSize:86,transition:"transform 0.4s cubic-bezier(0.34,1.56,0.64,1)",transform:b?"scale(1.12) rotate(5deg)":"scale(1) rotate(-3deg)"}}>🎓</div>
      <div style={{fontSize:36,fontWeight:900,color:theme.primary,fontFamily:"Nunito",letterSpacing:-1,marginBottom:4,marginTop:8}}>KidLearn</div>
      <div style={{fontSize:14,color:night?"#aaa":"#888",fontFamily:"Nunito",marginBottom:36}}>
        {lang==="fr"?"Apprends le français et l'anglais! 🌍":"Learn French & English! 🌍"}
      </div>
      <button onClick={onStart}
        style={{background:`linear-gradient(135deg,${theme.primary},${theme.secondary})`,color:"#fff",border:"none",borderRadius:24,padding:"18px 60px",fontSize:22,fontWeight:900,cursor:"pointer",fontFamily:"Nunito",boxShadow:`0 8px 28px ${theme.primary}60`,marginBottom:28,letterSpacing:0.5}}>
        🚀 {lang==="fr"?"Commencer":"Start"}
      </button>
      <div style={{display:"flex",gap:12}}>
        <button onClick={onSettings} style={{background:night?"#2a2a4a":"#f5f5f5",color:night?"#ddd":"#555",border:"none",borderRadius:16,padding:"12px 18px",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"Nunito"}}>⚙️ {lang==="fr"?"Paramètres":"Settings"}</button>
        <button onClick={onAbout} style={{background:night?"#2a2a4a":"#f5f5f5",color:night?"#ddd":"#555",border:"none",borderRadius:16,padding:"12px 18px",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"Nunito"}}>ℹ️ {lang==="fr"?"À propos":"About"}</button>
      </div>
      <div style={{marginTop:36,display:"flex",gap:10}}>
        {["🔢","🔤","🦁","🍎","👨‍👩‍👧‍👦"].map((e,i)=>(
          <div key={i} style={{fontSize:26,opacity:0.55,animation:`float ${1.5+i*0.2}s ease-in-out infinite alternate`,animationDelay:`${i*0.15}s`}}>{e}</div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════
function App(){
  const [view,setView]=useState("splash");
  const [cat,setCat]=useState(null);
  const [settings,setSettings]=useState({lang:"fr",voiceGender:"female",theme:THEMES[0]});
  useEffect(()=>{window.speechSynthesis?.getVoices();window.speechSynthesis?.addEventListener?.("voiceschanged",()=>window.speechSynthesis?.getVoices());},[]);

  const {theme}=settings;
  const night=theme.id==="night";

  return(
    <div style={{minHeight:"100vh",background:theme.bg,display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:480,minHeight:"100vh",background:night?"rgba(26,26,46,0.97)":"rgba(255,255,255,0.93)",backdropFilter:"blur(20px)"}}>

        {/* Top bar */}
        {view==="menu"&&(
          <div style={{display:"flex",alignItems:"center",padding:"14px 16px",borderBottom:night?"1px solid #333":"1px solid #f0f0f0",gap:10}}>
            <button onClick={()=>setView("splash")} style={{background:"transparent",border:"none",fontSize:22,cursor:"pointer"}}>🏠</button>
            <div style={{flex:1,fontSize:18,fontWeight:900,color:night?"#fff":"#2d2d2d",fontFamily:"Nunito"}}>KidLearn</div>
            <span style={{fontSize:22,cursor:"pointer"}} onClick={()=>setView("settings")}>⚙️</span>
          </div>
        )}

        <div style={{overflowY:"auto"}}>
          {view==="splash"&&<SplashView settings={settings} onStart={()=>setView("menu")} onSettings={()=>setView("settings")} onAbout={()=>setView("about")}/>}
          {view==="menu"&&<MenuView lang={settings.lang} theme={settings.theme} onSelect={c=>{setCat(c);setView("category");}}/>}
          {view==="category"&&cat&&<CategoryView category={cat} lang={settings.lang} voiceGender={settings.voiceGender} theme={settings.theme} onBack={()=>setView("menu")}/>}
          {view==="settings"&&<SettingsView settings={settings} onSave={s=>{setSettings(s);setView("splash");}} onBack={()=>setView("splash")}/>}
          {view==="about"&&<AboutView lang={settings.lang} theme={settings.theme} onBack={()=>setView("splash")}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
